# fly.toml app configuration file generated for lustre on 2026-06-20T23:20:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lustre'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'
  POST_INTERVAL_MINUTES = '30'

[[mounts]]
  source = 'lustre_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
