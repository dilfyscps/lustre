# fly.toml app configuration file generated for lustre on 2026-06-20T23:20:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lustre'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'
  LOCAL_CONTENT_DIR = '/data/content'
  POST_INTERVAL_MINUTES = '30'
  CONTENT_LOOP = 'true'

[[mounts]]
  source = 'lustre_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
